name: Update schools data

on:
  schedule:
    - cron: '0 6 * * 1'  # каждый понедельник в 6:00 UTC
  workflow_dispatch:       # или вручную через кнопку Run workflow

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run parser (2GIS + seed)
        run: python main.py --source 2gis,seed --build-site
        env:
          TWOGIS_API_KEY: ${{ secrets.TWOGIS_API_KEY }}

      - name: Commit and push updates
        run: |
          git config user.email "bot@github.com"
          git config user.name "GitHub Actions"
          git add docs/ output/
          git diff --staged --quiet || git commit -m "auto: update schools data $(date '+%Y-%m-%d')"
          git push
