name: Update schools data

on:
  schedule:
    - cron: '0 6 * * 1'  # каждый понедельник в 6:00 UTC
  workflow_dispatch:       # вручную через кнопку Run workflow

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Устанавливаем Chrome — нужен для Selenium парсера ГИБДД
      - name: Install Chrome
        run: |
          sudo apt-get update -q
          sudo apt-get install -y chromium-browser chromium-chromedriver
          chromium-browser --version

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # Запускаем все источники: seed + ГИБДД (Selenium) + avtoshkoli + 2GIS
      - name: Run parser
        run: python main.py --source seed,gibdd,avtoshkoli,2gis --build-site
        env:
          TWOGIS_API_KEY: ${{ secrets.TWOGIS_API_KEY }}
          # Chrome путь для GitHub Actions
          CHROME_BIN: /usr/bin/chromium-browser
          CHROMEDRIVER_PATH: /usr/bin/chromedriver

      - name: Commit and push updates
        run: |
          git config user.email "bot@github.com"
          git config user.name "GitHub Actions"
          git add docs/ output/
          git diff --staged --quiet || git commit -m "auto: update schools data $(date '+%Y-%m-%d')"
          git push
